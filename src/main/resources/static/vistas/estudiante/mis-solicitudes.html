<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mis solicitudes - EncuentraFormación</title>
  <script src="/js/comun/theme.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" integrity="sha384-XGjxtQfXaH2tnPFa9x+ruJTuLE3Aa6LhHSWRr1XeTyhezb4abCG4ccI5AkVDxqC+" crossorigin="anonymous">
  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/global.css">
  <link rel="stylesheet" href="/css/components.css">
</head>
<body class="ef-panel-body">

  <div id="navbar-container"></div>

  <main class="ef-panel-main">
    <div class="container px-4">

      <div class="ef-page-header">
        <h1 class="ef-page-title">Mis solicitudes de admisión</h1>
        <a href="/" class="btn btn-outline-secondary btn-sm">
          <i class="bi bi-arrow-left me-1"></i> Inicio
        </a>
      </div>

      <div id="recuadroAlert" class="alert alert-danger d-none mb-3"></div>

      <div id="listaSolicitudes"></div>
      <div id="paginacion" class="d-flex justify-content-between align-items-center mt-3 mb-4"></div>

    </div>
  </main>

  <!-- Modal de detalle de solicitud -->
  <div class="modal fade" id="modalDetalle" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered" style="max-width: 600px;">
      <div class="modal-content">
        <div class="modal-header pb-2">
          <div>
            <h5 class="modal-title fw-semibold mb-1" id="modalNombreFormacion"></h5>
            <p class="text-muted small mb-0" id="modalCentro"></p>
          </div>
          <button type="button" class="btn-close ms-3" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body py-4">
          <div class="d-flex flex-column gap-3">
            <div class="d-flex justify-content-between align-items-center">
              <span class="text-muted small">Estado</span>
              <span id="modalEstadoBadge"></span>
            </div>
            <hr class="my-0 opacity-25">
            <div class="d-flex justify-content-between align-items-center">
              <span class="text-muted small">Fecha de solicitud</span>
              <span class="small fw-medium" id="modalFechaSolicitud"></span>
            </div>
            <div id="filaFechaRespuesta" class="d-flex justify-content-between align-items-center d-none">
              <span class="text-muted small">Fecha de respuesta</span>
              <span class="small fw-medium" id="modalFechaRespuesta"></span>
            </div>
          </div>
        </div>
        <div class="modal-footer" id="modalFooter"></div>
      </div>
    </div>
  </div>

  <div id="footer-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
  <script src="/js/comun/navbar.js"></script>
  <script src="/js/comun/footer.js"></script>
  <script src="/js/comun/confirm-modal.js"></script>
  <script src="/js/estudiante/misSolicitudes.js"></script>
</body>
</html>
