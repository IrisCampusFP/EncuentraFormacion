<!doctype html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Estado de tu solicitud - EncuentraFormación</title>
    <script src="/js/comun/theme.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" integrity="sha384-XGjxtQfXaH2tnPFa9x+ruJTuLE3Aa6LhHSWRr1XeTyhezb4abCG4ccI5AkVDxqC+" crossorigin="anonymous">
    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/components.css">
</head>

<body class="ef-panel-body">

    <div id="navbar-container"></div>

    <main class="ef-panel-main">
        <div class="container" style="max-width: 860px;">

            <div class="ef-page-header">
                <div>
                    <h1 class="ef-page-title">
                        <i class="bi bi-hourglass-split me-2 text-warning"></i>Solicitud de gestión
                    </h1>
                    <p class="ef-page-subtitle">Consulta el estado de tu solicitud de alta como gestor de centro</p>
                </div>
                <button id="btnAccionPrincipal" class="btn btn-outline-secondary">
                    <i class="bi bi-arrow-left me-1"></i>Volver
                </button>
            </div>

            <div id="msgEstado" class="alert alert-warning d-flex align-items-start gap-3 mb-4" role="alert">
                <i class="bi bi-clock-history fs-5 flex-shrink-0 mt-1"></i>
                <div>
                    <strong>Solicitud pendiente de revisión</strong><br>
                    <span id="msgEmail">Recibirás un correo electrónico con la resolución.</span>
                </div>
            </div>

            <div id="msgError" class="alert alert-danger d-none mb-4" role="alert"></div>

            <div class="card border-0 shadow-sm mb-4">
                <div class="card-body p-4" id="datosSolicitud">
                    <div class="text-center py-4 text-muted">
                        <div class="spinner-border spinner-border-sm me-2" role="status"></div>
                        Cargando datos...
                    </div>
                </div>
            </div>

            <div class="d-flex justify-content-between align-items-center">
                <button id="btnCancelar" class="btn btn-outline-danger disabled">
                    <i class="bi bi-x-circle me-1"></i>Cancelar solicitud
                </button>
            </div>

        </div>
    </main>

    <div id="footer-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
    <script src="/js/comun/navbar.js"></script>
    <script src="/js/comun/footer.js"></script>
    <script src="/js/comun/confirm-modal.js"></script>
    <script src="/js/estudiante/estadoSolicitud.js"></script>
    <script src="/js/comun/logout.js"></script>
</body>

</html>
