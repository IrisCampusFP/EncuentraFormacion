<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Solicitudes - EncuentraFormación</title>
  <script src="/js/comun/theme.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" integrity="sha384-XGjxtQfXaH2tnPFa9x+ruJTuLE3Aa6LhHSWRr1XeTyhezb4abCG4ccI5AkVDxqC+" crossorigin="anonymous">
  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/global.css">
  <link rel="stylesheet" href="/css/components.css">
</head>
<body class="ef-panel-body">

  <div id="navbar-container"></div>

<main class="ef-panel-main">
  <div class="container-fluid px-4">
    <div class="ef-page-header">
      <h1 class="ef-page-title">Solicitudes de admisión</h1>
      <a href="/vistas/gestor/vista-gestion-centro.html" class="btn btn-outline-secondary">
        <i class="bi bi-arrow-left me-1"></i> Volver
      </a>
    </div>
    <div id="recuadroAlert" class="alert alert-danger d-none mb-3"></div>

    <!-- Filtros Superiores -->
    <div class="row mb-4 g-3 align-items-center">
      <div class="col-md-6 col-lg-4">
        <div class="input-group">
          <span class="input-group-text ef-input-icon"><i class="bi bi-search text-muted"></i></span>
          <input type="text" id="buscarEstudiante" class="form-control" placeholder="Buscar por nombre de estudiante...">
        </div>
      </div>
      <div class="col-md-6 col-lg-4">
        <select id="filtroFormacion" class="form-select">
          <option value="">Todas las formaciones</option>
        </select>
      </div>
    </div>

    <!-- Tabs Pendientes/Resueltas -->
    <ul class="nav nav-tabs ef-tabs mb-4" id="solicitudesTabs" role="tablist">
      <li class="nav-item" role="presentation">
        <button class="nav-link active" id="tabPendientes" data-bs-toggle="tab" type="button" role="tab">
          Pendientes <span class="badge bg-primary ms-1 d-none" id="badgePendientes"></span>
        </button>
      </li>
      <li class="nav-item" role="presentation">
        <button class="nav-link" id="tabResueltas" data-bs-toggle="tab" type="button" role="tab">
          Resueltas <span class="badge bg-secondary ms-1 d-none" id="badgeResueltas"></span>
        </button>
      </li>
    </ul>

    <!-- Pills para Resueltas (solo visible cuando Resueltas está activo) -->
    <div id="pillsResueltas" class="mb-3 d-none">
      <div class="d-flex gap-2 flex-wrap">
        <button class="btn btn-sm rounded-pill btn-primary pill-estado active" data-estado="TODAS_RESUELTAS">Todas <span class="opacity-75 ms-1" id="cntTodas"></span></button>
        <button class="btn btn-sm rounded-pill btn-outline-success pill-estado" data-estado="ACEPTADA">Aceptadas <span class="opacity-75 ms-1" id="cntAceptadas"></span></button>
        <button class="btn btn-sm rounded-pill btn-outline-danger pill-estado" data-estado="RECHAZADA">Rechazadas <span class="opacity-75 ms-1" id="cntRechazadas"></span></button>
        <button class="btn btn-sm rounded-pill btn-outline-secondary pill-estado" data-estado="CANCELADA">Canceladas <span class="opacity-75 ms-1" id="cntCanceladas"></span></button>
      </div>
    </div>

    <!-- Contenedor de Tabla -->
    <div id="listaSolicitudes"></div>
    <div id="paginacion" class="d-flex justify-content-between align-items-center mt-3 mb-5"></div>
  </div>
</main>

<div id="footer-container"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
<script src="/js/comun/confirm-modal.js"></script>
<script src="/js/comun/navbar.js"></script>
<script src="/js/comun/footer.js"></script>
<script src="/js/gestor/gestorSolicitudes.js"></script>
</body>
</html>
