<!doctype html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Buscar centros — EncuentraFormación</title>
    <script src="/js/comun/theme.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" integrity="sha384-XGjxtQfXaH2tnPFa9x+ruJTuLE3Aa6LhHSWRr1XeTyhezb4abCG4ccI5AkVDxqC+" crossorigin="anonymous">
    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/components.css">
</head>

<body class="ef-panel-body">

    <div id="navbar-container"></div>

    <!-- Hero -->
    <header class="ef-hero">
        <div class="container py-3">
            <h1 class="ef-hero-title">Encuentra tu centro ideal</h1>
            <p class="ef-hero-subtitle">Explora centros de formación en toda España.</p>
        </div>
    </header>

    <div class="container mt-3">
        <div id="infoAlert" class="alert alert-success alert-dismissible d-none" role="alert">
            <i class="bi bi-check-circle me-2"></i><span id="infoAlertText"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Cerrar"></button>
        </div>
    </div>

    <!-- Buscador -->
    <section class="container my-5">
        <form id="formBuscador" class="card p-4 ef-form-buscador">

            <!-- Filtros: nombre + provincia + localidad + tipo + botones -->
            <div class="row g-3 align-items-end">
                <div class="col-12 col-md-3">
                    <label class="form-label fw-semibold small text-muted">Nombre del centro</label>
                    <input type="text" id="filtroNombre" class="form-control"
                           placeholder="Ej: Institut Tecnològic...">
                </div>
                <div class="col-12 col-md-3">
                    <label class="form-label fw-semibold small text-muted">Provincia</label>
                    <div class="ef-combobox position-relative" id="comboProvincia">
                        <div class="ef-combobox-wrap d-flex align-items-center" id="comboProvinciaWrap">
                            <input type="text" id="comboProvinciaInput" class="form-control"
                                   placeholder="Buscar provincia..." autocomplete="off">
                            <button type="button" class="ef-combobox-clear d-none" id="comboProvincia-clear"
                                    title="Quitar filtro de provincia">
                                <i class="bi bi-x-lg"></i>
                            </button>
                        </div>
                        <ul class="ef-combobox-dropdown d-none" id="comboProvinciaLista"></ul>
                    </div>
                </div>
                <div class="col-12 col-md-2">
                    <label class="form-label fw-semibold small text-muted">Localidad</label>
                    <input type="text" id="filtroLocalidad" class="form-control" placeholder="Ej: Barcelona">
                </div>
                <div class="col-12 col-md-2">
                    <label class="form-label fw-semibold small text-muted">Tipo de centro</label>
                    <select id="filtroTipo" class="form-select">
                        <option value="">Todos</option>
                        <option value="PUBLICO">Público</option>
                        <option value="PRIVADO">Privado</option>
                        <option value="CONCERTADO">Concertado</option>
                    </select>
                </div>
                <div class="col-12 col-md-1">
                    <button type="submit" class="btn btn-gradient-accent w-100 fw-bold">
                        <i class="bi bi-search"></i>
                    </button>
                </div>
                <div class="col-12 col-md-1">
                    <button type="button" class="btn btn-outline-secondary w-100" id="btnLimpiarFiltros" title="Limpiar filtros">
                        <i class="bi bi-x-circle"></i>
                    </button>
                </div>
            </div>

        </form>
    </section>

    <!-- Barra de ordenamiento -->
    <section class="container mb-3">
        <div class="d-flex align-items-center gap-2 flex-wrap">
            <span class="small text-muted fw-medium me-1">Ordenar:</span>
            <button type="button" class="btn btn-sm btn-outline-secondary sort-pill" data-sort="az" id="pillAZ">
                <i class="bi bi-sort-alpha-down me-1"></i>A–Z
            </button>
            <button type="button" class="btn btn-sm btn-primary sort-pill" data-sort="valorados">
                <i class="bi bi-star-fill me-1"></i>Mejor valorados
            </button>
        </div>
    </section>

    <!-- Resultados -->
    <section class="container mb-5 flex-grow-1">
        <p id="totalResultados" class="text-muted small mb-3 fw-medium"></p>
        <div id="spinner" class="text-center py-5 d-none">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Cargando...</span>
            </div>
        </div>
        <div id="resultados" class="row g-4"></div>
        <div id="paginacion" class="mt-5"></div>

        <div class="text-center py-4 mt-2 border-top">
            <p class="text-muted mb-0">¿No encuentras tu centro? <a href="/vistas/auth/registro-centro.html" class="fw-semibold">Regístralo aquí</a></p>
        </div>
    </section>

    <div id="footer-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
    <script src="/js/comun/navbar.js"></script>
    <script src="/js/comun/footer.js"></script>
    <script src="/js/comun/utils.js"></script>
    <script src="/js/publico/buscadorCentros.js"></script>
</body>
</html>
