<!doctype html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Registrar centro - EncuentraFormación</title>
    <script src="/js/comun/theme.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" integrity="sha384-XGjxtQfXaH2tnPFa9x+ruJTuLE3Aa6LhHSWRr1XeTyhezb4abCG4ccI5AkVDxqC+" crossorigin="anonymous">
    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/components.css">
</head>

<body class="ef-auth-body">

    <div class="ef-theme-float">
        <button id="themeToggle" class="ef-btn-icon" title="Cambiar a modo oscuro">
            <i id="themeIcon" class="bi bi-moon-fill"></i>
        </button>
    </div>

    <div class="ef-auth-wrapper py-4">
        <div class="ef-auth-card ef-auth-card--wide">

            <div class="ef-auth-header" id="authHeader">
                <div class="ef-logo-mark">EF</div>
                <h1 class="ef-auth-title">Registrar centro</h1>
                <p class="ef-auth-tagline mt-2">
                    Introduce los datos del centro formativo para que aparezca en el buscador.
                </p>
            </div>

            <form id="formularioCentro" enctype="multipart/form-data">
                <div id="registroError" class="alert alert-danger d-none mb-4" role="alert"></div>

                <div class="row g-3 mb-3">
                    <div class="col-md-6">
                        <label for="nombre" class="form-label">Nombre del centro <span class="text-required">*</span></label>
                        <input type="text" class="form-control" id="nombre" name="nombre" required>
                    </div>
                    <div class="col-md-6">
                        <label for="codigo" class="form-label">
                            Código del centro <span class="text-required">*</span>
                            <a href="https://www.educacion.gob.es/centros/home.do" target="_blank" rel="noopener"
                               class="text-decoration-none ms-1"
                               title="Haz clic para consultar el código en el directorio del Ministerio de Educación"
                               data-bs-toggle="tooltip" data-bs-placement="top">
                                <i class="bi bi-info-circle text-muted"></i>
                            </a>
                        </label>
                        <input type="text" class="form-control" id="codigo" name="codigo"
                               maxlength="8" inputmode="numeric" pattern="\d{8}" required>
                        <div id="codigoError" class="invalid-feedback"></div>
                    </div>
                </div>

                <div class="row g-3 mb-3">
                    <div class="col-md-6">
                        <label for="direccion" class="form-label">Dirección <span class="text-required">*</span></label>
                        <input type="text" class="form-control" id="direccion" name="direccion" required>
                    </div>
                    <div class="col-md-6">
                        <label for="localidad" class="form-label">Localidad <span class="text-required">*</span></label>
                        <input type="text" class="form-control" id="localidad" name="localidad" required>
                    </div>
                </div>

                <div class="row g-3 mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Provincia <span class="text-required">*</span></label>
                        <div class="ef-combobox position-relative" id="comboProvincia">
                            <div class="ef-combobox-wrap d-flex align-items-center" id="comboProvinciaWrap">
                                <input type="text" id="provincia" class="form-control"
                                       placeholder="Buscar provincia..." autocomplete="off">
                                <button type="button" class="ef-combobox-clear d-none" id="comboProvincia-clear"
                                        title="Quitar selección">
                                    <i class="bi bi-x-lg"></i>
                                </button>
                            </div>
                            <ul class="ef-combobox-dropdown d-none" id="comboProvinciaLista"></ul>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <label for="telefono" class="form-label">Teléfono <span class="text-muted fw-normal">(Opcional)</span></label>
                        <input type="text" class="form-control" id="telefono" name="telefono">
                    </div>
                </div>

                <div class="row g-3 mb-3">
                    <div class="col-md-6">
                        <label for="email" class="form-label">Email <span class="text-muted fw-normal">(Opcional)</span></label>
                        <input type="email" class="form-control" id="email" name="email">
                    </div>
                    <div class="col-md-6">
                        <label for="web" class="form-label">Página web <span class="text-muted fw-normal">(Opcional)</span></label>
                        <input type="url" class="form-control" id="web" name="web">
                    </div>
                </div>

                <div class="mb-4">
                    <label for="tipo" class="form-label">Tipo de centro <span class="text-required">*</span></label>
                    <select class="form-select" id="tipo" name="tipo" required>
                        <option value="" selected disabled>Selecciona una opción</option>
                        <option value="PUBLICO">Público</option>
                        <option value="PRIVADO">Privado</option>
                        <option value="CONCERTADO">Concertado</option>
                        <option value="MIXTO">Mixto</option>
                    </select>
                </div>

                <div class="d-grid mb-3">
                    <button id="btnSubmitCentro" type="submit" class="btn btn-primary btn-lg">Registrar centro</button>
                </div>

                <div class="text-center">
                    <a href="/" class="text-decoration-none ef-text-hint">
                        &larr; Volver al inicio
                    </a>
                </div>
            </form>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
    <script src="/js/comun/utils.js"></script>
    <script src="/js/auth/registroCentro.js"></script>
    <script src="/js/comun/logout.js"></script>
</body>

</html>
