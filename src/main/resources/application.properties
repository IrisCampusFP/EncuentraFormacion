
# CONFIGURACION DE CONEXION A BASE DE DATOS

# Carga las variables del archivo .env
spring.config.import=optional:file:.env[.properties] 

# Configuracion del DataSource PostgreSQL
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuracion de JPA / Hibernate

# Mostrar las consultas SQL en consola (util para depuracion)
spring.jpa.show-sql=false
# Formatear las consultas SQL para mejor legibilidad
spring.jpa.properties.hibernate.format_sql=true

# Estrategia de generacion del esquema:
# - none: No hace nada (produccion)
# - validate: Valida el esquema pero no lo modifica
# - update: Actualiza el esquema si es necesario
# - create: Crea el esquema, destruyendo datos previos
# - create-drop: Crea al inicio y elimina al cerrar
# Uso none porque flyway se encarga de crear y actualizar la base de datos
spring.jpa.hibernate.ddl-auto=none
# Define el esquema por defecto para Hibernate (necesario para la validacion de tablas)
spring.jpa.properties.hibernate.default_schema=encuentra_formacion

# Configuracion del Pool de Conexiones
# (HikariCP - incluido por defecto)
spring.datasource.hikari.connection-init-sql=SET search_path TO encuentra_formacion, public
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
# Tiempo maximo que una conexion puede estar inactiva antes de cerrarse (10 min)
spring.datasource.hikari.idle-timeout=600000
# Tiempo maximo de vida de una conexion, evita conexiones "zombi" (30 min)
spring.datasource.hikari.max-lifetime=1800000
# Keepalive: envia un ping a PostgreSQL cada 2 min para detectar conexiones muertas
spring.datasource.hikari.keepalive-time=120000

# CONFIGURACION DE FLYWAY (MIGRACIONES DE BASE DE DATOS)
# Flyway gestiona las versiones de la BD 
# Al arrancar, Flyway aplica automaticamente los scripts pendientes
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.schemas=encuentra_formacion
spring.flyway.default-schema=encuentra_formacion
spring.flyway.create-schemas=true

# Verifica que los scripts ya aplicados no hayan sido modificados a posteriori
spring.flyway.validate-on-migrate=true

# Permite ejecutar scripts de versiones anteriores, ejemplo: V1, V2, V3, V1_1, V4
spring.flyway.out-of-order=true

# Nombre de la aplicacion
spring.application.name=EncuentraFormacion

# Puerto
server.port=8080

# Apagado ordenado: espera a que terminen las peticiones en curso antes de cerrar
# Esto garantiza que HikariCP cierre las conexiones correctamente
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=20s

# Cierra la sesion de Hibernate al terminar el servicio para evitar consultas automaticas en la vista
spring.jpa.open-in-view=false


# CONFIGURACION DE SPRING SECURITY

# Clave secreta (debe proporcionarse via variable de entorno JWT_SECRET para produccion)
jwt.secret=${JWT_SECRET}
# Duracion de la sesion: 24 horas (en milisegundos)
jwt.expiration=86400000
# Indica si la cookie JWT se establece como Secure (solo HTTPS).
# Debe ser false en desarrollo local (HTTP) y true en produccion (HTTPS).
jwt.cookie.secure=${JWT_COOKIE_SECURE}

# CONFIGURACIÓN DE PAGINAS DE ERROR
# Especificamos a Spring Boot que busque las páginas de error en la carpeta /error de los recursos estáticos.
spring.web.error.path=/error

# CONFIGURACION DE LOGS (SLF4J / Logback)

# PARA DESARROLLO:
# Se mostrara mucha informacion util e interna (util para depuracion pero satura el archivo de logs)

# 1. Logs de seguridad (verificacion de tokens, autenticacion, rutas denegadas...)
#logging.level.org.springframework.security=DEBUG 

# 2. Logs propios de la aplicacion (controladores, servicios, repositorios...)
#logging.level.com.irisperez.tfg.encuentraformacion=DEBUG


# PARA PRODUCCION:
# Se mostrara informacion esencial sin detallar cada paso interno (para no saturar el archivo de logs)

# 1. Spring Security solo muestra errores graves
logging.level.org.springframework.security=INFO

# 2. Solo muestra arranques y excepciones de la aplicacion
logging.level.com.irisperez.tfg.encuentraformacion=DEBUG

# Nivel general de Spring Boot
# INFO: Recomendado para produccion (oculta los debug pero muestra info, warn y error)
#logging.level.root=INFO
# WARN: Solo muestra advertencias y errores, recomendado para produccion si se quiere reducir el ruido en los logs
logging.level.root=WARN

# Flyway muestra en consola las migraciones que aplica al arrancar
logging.level.org.flywaydb=INFO

# Archivo de log
logging.file.name=logs/app.log

# Politicas de rotacion del archivo (para que no ocupe Gigas y Gigas con el tiempo)
# Cuando el fichero llegue a 10MB, se crea uno nuevo (ej: app-1.log)
logging.logback.rollingpolicy.max-file-size=10MB
# Se guarda un maximo de 30 archivos, luego se van eliminando los mas antiguos
logging.logback.rollingpolicy.max-history=30

# CONFIGURACION DE SUBIDA DE ARCHIVOS
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# CONFIGURACION DE CORS
# Origenes permitidos para CORS (separados por coma si son varios).
# En produccion, sustituir por el dominio real via variable de entorno CORS_ALLOWED_ORIGINS.
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:8080}

# CONFIGURACION DE RATE LIMITING
# IPs de proxies o balanceadores de carga de confianza (separadas por coma).
# Solo si la peticion viene de una de estas IPs, se confiara en X-Forwarded-For.
# Dejar vacio (valor por defecto) en desarrollo local para usar siempre RemoteAddr.
rate-limiting.trusted-proxies=${RATE_LIMIT_TRUSTED_PROXIES:}

# CONFIGURACION DEL ASISTENTE IA
# Primario: Gemini (Google AI Studio) - API key en https://aistudio.google.com/app/apikey
gemini.api-key=${GEMINI_API_KEY}
gemini.base-url=${GEMINI_BASE_URL:https://generativelanguage.googleapis.com/v1beta}
gemini.model=${GEMINI_MODEL:gemini-2.0-flash-lite}
gemini.timeout-segundos=${GEMINI_TIMEOUT:60}
gemini.max-tokens=${GEMINI_MAX_TOKENS:900}

# Fallback: Groq - API key en https://console.groq.com/keys
groq.api-key=${GROQ_API_KEY}
groq.base-url=${GROQ_BASE_URL:https://api.groq.com/openai/v1}
groq.model=${GROQ_MODEL:llama-3.3-70b-versatile}
groq.timeout-segundos=${GROQ_TIMEOUT:60}
groq.max-tokens=${GROQ_MAX_TOKENS:900}
