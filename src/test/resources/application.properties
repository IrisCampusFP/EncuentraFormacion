# Propiedades de prueba
# Estas propiedades se aplican a todos los tests (sobrescriben application.properties
# del main donde sea necesario para evitar dependencias externas en el entorno CI/CD)

# Evita cargar el archivo .env (puede no existir en CI)
spring.config.import=

# Configuracion de base de datos en memoria (H2) para tests de integracion
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL;INIT=RUNSCRIPT FROM 'classpath:h2-init.sql'
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# JPA: validar esquema en test con base de datos en memoria
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.default_schema=

# JWT: valores fijos para tests (se usan en @Value del AuthController)
jwt.secret=claveSecretaParaTestsDeLaAplicacionFP2024XYZ
jwt.expiration=86400000
jwt.cookie.secure=false

# Logging minimo en tests
logging.level.root=ERROR
logging.file.name=

# Flyway desactivado en tests (H2 usa ddl-auto=create-drop)
spring.flyway.enabled=false

# FUNCTION('unaccent',...) en @Query JPQL requiere PostgreSQL — H2 no lo reconoce en validación
spring.jpa.properties.hibernate.query.startup_check=false

# Propiedades requeridas para SecurityConfig y RateLimitingFilter en tests
cors.allowed-origins=http://localhost:8080,http://localhost:3000
rate-limiting.trusted-proxies=127.0.0.1

# Asistente IA - valores dummy para que el contexto cargue en tests
gemini.api-key=test-key-gemini
gemini.base-url=http://localhost:9999
gemini.model=gemini-test
gemini.timeout-segundos=10
gemini.max-tokens=100

groq.api-key=test-key-groq
groq.base-url=http://localhost:9999
groq.model=llama-test
groq.timeout-segundos=10
groq.max-tokens=100